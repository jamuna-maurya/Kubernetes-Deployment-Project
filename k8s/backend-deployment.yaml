apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: jamuna22/backend:v1

        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service

metadata:
  name: backend-service

spec:
  selector:
    app: backend

  ports:
  - port: 5000

  type: ClusterIP

